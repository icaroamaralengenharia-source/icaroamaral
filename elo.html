<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elo | Pergunte ao Elo</title>
  <meta name="description" content="Converse com o Elo.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="relatorio-qualidade-obras/elo-assistente.css">
  <link rel="stylesheet" href="elo.css">
</head>
<body data-elo-mode="standalone" data-elo-product="chat">
  <header class="elo-product-top">
    <a class="elo-about-link" href="/sobreoelo.html">Sobre o Elo</a>
  </header>

  <main class="elo-product-shell" aria-labelledby="elo-product-title">
    <section class="elo-product-center">
      <a class="elo-product-brand" href="index.html" aria-label="Voltar ao inicio">
        <span class="elo-mark" aria-hidden="true"></span>
        <span>
          <strong>ELO</strong>
          <small>Assistente com memória</small>
        </span>
      </a>
      <div class="elo-product-heading">
        <h1 id="elo-product-title" class="elo-hero-title" aria-live="polite">
          <span class="elo-rotating-text" data-elo-rotating-text>Como posso <span class="elo-highlight">te ajudar</span> hoje?</span>
        </h1>
        <p>Seu contexto continua aqui.</p>
        <div class="elo-prompt-dots" data-elo-prompt-dots aria-label="Frases do Elo"></div>
      </div>
      <div class="elo-attachment-preview" data-elo-attachment-preview>
        <div class="elo-attachment-chip">
          <span class="elo-attachment-icon" aria-hidden="true">▣</span>
          <span class="elo-attachment-name" data-elo-attachment-name></span>
          <span class="elo-attachment-size" data-elo-attachment-size></span>
          <button type="button" class="elo-attachment-remove" data-elo-attachment-remove aria-label="Remover arquivo">×</button>
        </div>
      </div>
      <div class="elo-product-chat" id="eloStandaloneMount" aria-label="Conversa com o Elo"></div>
    </section>
  </main>

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    window.ELO_STANDALONE_MODE = true;
    window.ELO_PRODUCT_MODE = true;
    window.ELO_DISABLE_AUTOFOCUS = true;

    if (!/^(localhost|127\.0\.0\.1)$/.test(window.location.hostname)) {
      window.ELO_API_BASE_URL = "https://obrareport-backend.onrender.com";
    }

    window.addEventListener("pageshow", function () {
      window.scrollTo(0, 0);
    });

    const eloPromptPhrases = [
      'Como posso <span class="elo-highlight">te ajudar</span> hoje?',
      'O que vamos <span class="elo-highlight">resolver</span> agora?',
      'Quer <span class="elo-highlight">analisar</span> um arquivo?',
      'Vamos <span class="elo-highlight">organizar</span> uma ideia?',
      'Qual é o <span class="elo-highlight">próximo passo</span>?'
    ];

    let eloPromptIndex = 0;

    function setEloPromptPhrase(nextIndex) {
      const textEl = document.querySelector("[data-elo-rotating-text]");
      const dots = document.querySelectorAll(".elo-prompt-dot");

      if (!textEl) {
        return;
      }

      eloPromptIndex = nextIndex;
      textEl.classList.add("is-changing");

      window.setTimeout(function () {
        textEl.innerHTML = eloPromptPhrases[eloPromptIndex];
        textEl.classList.remove("is-changing");

        dots.forEach(function (dot, index) {
          dot.classList.toggle("is-active", index === eloPromptIndex);
        });
      }, 220);
    }

    function initEloRotatingPrompt() {
      const textEl = document.querySelector("[data-elo-rotating-text]");
      const dotsWrap = document.querySelector("[data-elo-prompt-dots]");

      if (!textEl || !dotsWrap) {
        return;
      }

      dotsWrap.innerHTML = "";

      eloPromptPhrases.forEach(function (_, index) {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = "elo-prompt-dot" + (index === 0 ? " is-active" : "");
        dot.setAttribute("aria-label", "Frase " + (index + 1));
        dot.addEventListener("click", function () {
          setEloPromptPhrase(index);
        });
        dotsWrap.appendChild(dot);
      });

      textEl.innerHTML = eloPromptPhrases[0];

      window.setInterval(function () {
        setEloPromptPhrase((eloPromptIndex + 1) % eloPromptPhrases.length);
      }, 4200);
    }

    document.addEventListener("DOMContentLoaded", initEloRotatingPrompt);
  </script>
  <script src="relatorio-qualidade-obras/elo-assistente.js?v=elo-reference-20260603" defer></script>
</body>
</html>
