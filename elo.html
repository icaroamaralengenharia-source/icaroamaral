  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    window.addEventListener("pageshow", function () {
      window.scrollTo(0, 0);
    });
    const eloPromptPhrases = [
      'Oi, o que vamos fazer hoje?',
      'Me diga o que eu posso fazer pra te ajudar!',
      'Hoje é um bom dia, por onde quer começar?'
    ];

    let eloPromptIndex = 0;
    let eloPromptTimer = null;

    function setEloPromptPhrase(nextIndex) {
      const textEl = document.querySelector("[data-elo-rotating-text]");

      if (!textEl) {
        return;
      }

      eloPromptIndex = nextIndex;
      textEl.classList.add("is-changing");

      window.setTimeout(function () {
        textEl.innerHTML = eloPromptPhrases[eloPromptIndex];
        textEl.classList.remove("is-changing");
      }, 220);
    }

    function prefersReducedEloPromptMotion() {
      return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }

    function initEloRotatingPrompt() {
      const textEl = document.querySelector("[data-elo-rotating-text]");

      if (!textEl) {
        return;
      }

      textEl.innerHTML = eloPromptPhrases[0];

      if (prefersReducedEloPromptMotion() || eloPromptTimer) {
        return;
      }

      eloPromptTimer = window.setInterval(function () {
        setEloPromptPhrase((eloPromptIndex + 1) % eloPromptPhrases.length);
      }, 4000);
    }

    function formatEloFileSize(bytes) {
      if (!bytes && bytes !== 0) {
        return "";
      }
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unitIndex = 0;

      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }

      return size.toFixed(unitIndex === 0 ? 0 : 1).replace(".", ",") + " " + units[unitIndex];
    }

    function isEloPreviewImage(file) {
      const type = String(file && file.type || "").toLowerCase();
      const name = String(file && file.name || "").toLowerCase();
      return type === "image/jpeg" ||
        type === "image/jpg" ||
        type === "image/png" ||
        type === "image/webp" ||
        /\.(jpg|jpeg|jfif|png|webp)$/.test(name);
    }

    function clearEloAttachmentPreview() {
      const fileInput = document.querySelector(".elo-attachment-input");
      const attachButton = document.querySelector(".elo-attach-button");
      const preview = document.querySelector("[data-elo-attachment-preview]");
      const iconEl = document.querySelector(".elo-attachment-icon");
      const nameEl = document.querySelector("[data-elo-attachment-name]");
      const sizeEl = document.querySelector("[data-elo-attachment-size]");

      if (fileInput) {
        fileInput.value = "";
      }
      if (iconEl) {
        iconEl.textContent = "▣";
      }
      if (nameEl) {
        nameEl.textContent = "";
      }
      if (sizeEl) {
        sizeEl.textContent = "";
      }
      if (preview) {
        preview.classList.remove("is-visible");
      }
      if (attachButton) {
        attachButton.classList.remove("is-attached");
        attachButton.textContent = "Anexar";
      }
    }

    function initEloMinimalInput() {
      if (window.EloAssistente && typeof window.EloAssistente.mountMinimal === "function") {
        return;
      }

      const form = document.querySelector(".elo-input-row");
      const fileInput = document.querySelector(".elo-attachment-input");
      const attachButton = document.querySelector(".elo-attach-button");
      const preview = document.querySelector("[data-elo-attachment-preview]");
      const nameEl = document.querySelector("[data-elo-attachment-name]");
      const sizeEl = document.querySelector("[data-elo-attachment-size]");
      const removeButton = document.querySelector("[data-elo-attachment-remove]");

      if (attachButton && fileInput) {
        attachButton.addEventListener("click", function () {
          fileInput.click();
        });
      }

      if (fileInput) {
        fileInput.addEventListener("change", function () {
          const file = fileInput.files && fileInput.files[0];
          if (!file) {
            clearEloAttachmentPreview();
            return;
          }
          const iconEl = document.querySelector(".elo-attachment-icon");
          if (iconEl) {
            iconEl.textContent = isEloPreviewImage(file) ? "📷" : "▣";
          }
          if (nameEl) {
            nameEl.textContent = file.name;
          }
          if (sizeEl) {
            sizeEl.textContent = "· " + formatEloFileSize(file.size);
          }
          if (preview) {
            preview.classList.add("is-visible");
          }
          if (attachButton) {
            attachButton.classList.add("is-attached");
            attachButton.textContent = "Anexado";
          }
        });
      }

      if (removeButton) {
        removeButton.addEventListener("click", clearEloAttachmentPreview);
      }

    }

    function initEloPromptShortcuts() {
      const buttons = document.querySelectorAll("[data-elo-prompt]");
      const input = document.querySelector(".elo-input");

      if (!buttons.length || !input) {
        return;
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          input.value = button.getAttribute("data-elo-prompt") || "";
          input.focus();
        });
      });
    }

    window.ELO_PRODUCT_MODE = true;
    window.ELO_SKIP_AUTO_WIDGET = true;
    window.ELO_DISABLE_AUTOFOCUS = true;
    window.ELO_RESIDENTIAL_NEW_PIPELINE = true;

    document.addEventListener("DOMContentLoaded", initEloRotatingPrompt);
    document.addEventListener("DOMContentLoaded", initEloPromptShortcuts);
    document.addEventListener("DOMContentLoaded", function () {
      if (window.EloAssistente && typeof window.EloAssistente.initializeSurface === "function") {
        window.EloAssistente.initializeSurface({
          surface: "elo",
          panel: ".elo-standalone-panel",
          messages: ".elo-messages",
          form: ".elo-input-row",
          input: ".elo-input",
          attachmentInput: ".elo-attachment-input",
          attachmentButton: ".elo-attach-button",
          newChatButton: "[data-elo-new-chat]",
          historyButton: "[data-elo-history]",
          memoryButton: "[data-elo-memory]"
        });
        initEloRotatingPrompt();
      }
    });
  </script>
