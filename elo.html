<body class="elo-auth-required elo-empty-state" data-elo-mode="standalone" data-elo-product="chat">
  <header class="elo-product-top" aria-label="ELO CORE">

    </a>
    <nav class="elo-core-actions" aria-label="Ações da conversa">
      <button type="button" data-elo-new-chat>Nova conversa</button>
      <button type="button" data-elo-history>Histórico</button>
      <button type="button" data-elo-memory>Memória</button>
    </nav>
    <section class="elo-local-auth" data-elo-auth-panel aria-label="Login Supabase do ELO">
      <form class="elo-local-auth-form" data-elo-auth-form autocomplete="on">
        <input type="email" name="email" placeholder="Email Supabase" autocomplete="username" required>
        <input type="password" name="password" placeholder="Senha" autocomplete="current-password" required>
        <button type="submit">Entrar</button>
      </form>
      <div class="elo-local-auth-session" data-elo-auth-session hidden>
        <span data-elo-auth-user></span>
        <button type="button" data-elo-auth-logout>Sair</button>
      </div>
      <p class="elo-local-auth-status" data-elo-auth-status aria-live="polite"></p>
    </section>
  </header>

  <main class="elo-product-shell" aria-labelledby="elo-product-title">
    <section class="elo-product-center">
      <div class="elo-product-heading elo-core-welcome">
        <h1 id="elo-product-title" class="elo-hero-title" aria-live="polite">
          <span class="elo-rotating-text" data-elo-rotating-text>Oi, o que vamos fazer hoje?</span>
        </h1>
        <p class="elo-empty-copy">Estou pronto para analisar, organizar e continuar seu trabalho.</p>
      </div>
      <div class="elo-attachment-preview" data-elo-attachment-preview>
        <div class="elo-attachment-chip">
          <span class="elo-attachment-icon" aria-hidden="true">▣</span>
          <span class="elo-attachment-name" data-elo-attachment-name></span>
          <span class="elo-attachment-size" data-elo-attachment-size></span>
          <button type="button" class="elo-attachment-remove" data-elo-attachment-remove aria-label="Remover arquivo">×</button>
        </div>
      </div>
      <div class="elo-product-chat" aria-label="Conversa com o Elo">
        <section class="elo-standalone-panel" aria-label="Elo">
          <div class="elo-messages" aria-live="polite" aria-label="Mensagens da conversa"></div>
          <p class="elo-input-hint">O ELO pode guardar informações úteis para continuar suas conversas. Você pode revisar ou apagar essa memória quando quiser.</p>
          <form class="elo-input-row">
            <button type="button" class="elo-attach-button" aria-label="Anexar PDF, planilha ou imagem">Anexar</button>
            <input class="elo-attachment-input" type="file" multiple accept="application/pdf,.pdf,.xls,.xlsx,.csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,image/*">
            <textarea class="elo-input" maxlength="2000" rows="1" placeholder="Pergunte ao ELO CORE..."></textarea>
            <button type="submit" class="elo-send-button">Enviar</button>
          </form>
        </section>
      </div>
    </section>

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    window.addEventListener("pageshow", function () {
      window.scrollTo(0, 0);
    });
    const eloPromptPhrases = [
      'Oi, o que vamos fazer hoje?',
      'Me diga o que eu posso fazer pra te ajudar!',
      'Hoje é um bom dia, por onde quer começar?'
    ];

    let eloPromptIndex = 0;
    let eloPromptTimer = null;

    function setEloPromptPhrase(nextIndex) {
      const textEl = document.querySelector("[data-elo-rotating-text]");

      if (!textEl) {
        return;
      }

      eloPromptIndex = nextIndex;
      textEl.classList.add("is-changing");

      window.setTimeout(function () {
        textEl.innerHTML = eloPromptPhrases[eloPromptIndex];
        textEl.classList.remove("is-changing");
      }, 220);
    }

    function prefersReducedEloPromptMotion() {
      return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }

    function initEloRotatingPrompt() {
      const textEl = document.querySelector("[data-elo-rotating-text]");

      if (!textEl) {
        return;
      }

      textEl.innerHTML = eloPromptPhrases[0];

      if (prefersReducedEloPromptMotion() || eloPromptTimer) {
        return;
      }

      eloPromptTimer = window.setInterval(function () {
        setEloPromptPhrase((eloPromptIndex + 1) % eloPromptPhrases.length);
      }, 4000);
    }

    function formatEloFileSize(bytes) {
      if (!bytes && bytes !== 0) {
        return "";
      }
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unitIndex = 0;

      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }

      return size.toFixed(unitIndex === 0 ? 0 : 1).replace(".", ",") + " " + units[unitIndex];
    }

    function isEloPreviewImage(file) {
      const type = String(file && file.type || "").toLowerCase();
      const name = String(file && file.name || "").toLowerCase();
      return type === "image/jpeg" ||
        type === "image/jpg" ||
        type === "image/png" ||
        type === "image/webp" ||
        /\.(jpg|jpeg|jfif|png|webp)$/.test(name);
    }

    function clearEloAttachmentPreview() {
      const fileInput = document.querySelector(".elo-attachment-input");
      const attachButton = document.querySelector(".elo-attach-button");
      const preview = document.querySelector("[data-elo-attachment-preview]");
      const iconEl = document.querySelector(".elo-attachment-icon");
      const nameEl = document.querySelector("[data-elo-attachment-name]");
      const sizeEl = document.querySelector("[data-elo-attachment-size]");

      if (fileInput) {
        fileInput.value = "";
      }
      if (iconEl) {
        iconEl.textContent = "▣";
      }
      if (nameEl) {
        nameEl.textContent = "";
      }
      if (sizeEl) {
        sizeEl.textContent = "";
      }
      if (preview) {
        preview.classList.remove("is-visible");
      }
      if (attachButton) {
        attachButton.classList.remove("is-attached");
        attachButton.textContent = "Anexar";
      }
    }

    function initEloMinimalInput() {
      if (window.EloAssistente && typeof window.EloAssistente.mountMinimal === "function") {
        return;
      }

      const form = document.querySelector(".elo-input-row");
      const fileInput = document.querySelector(".elo-attachment-input");
      const attachButton = document.querySelector(".elo-attach-button");
      const preview = document.querySelector("[data-elo-attachment-preview]");
      const nameEl = document.querySelector("[data-elo-attachment-name]");
      const sizeEl = document.querySelector("[data-elo-attachment-size]");
      const removeButton = document.querySelector("[data-elo-attachment-remove]");

      if (attachButton && fileInput) {
        attachButton.addEventListener("click", function () {
          fileInput.click();
        });
      }

      if (fileInput) {
        fileInput.addEventListener("change", function () {
          const file = fileInput.files && fileInput.files[0];
          if (!file) {
            clearEloAttachmentPreview();
            return;
          }
          const iconEl = document.querySelector(".elo-attachment-icon");
          if (iconEl) {
            iconEl.textContent = isEloPreviewImage(file) ? "📷" : "▣";
          }
          if (nameEl) {
            nameEl.textContent = file.name;
          }
          if (sizeEl) {
            sizeEl.textContent = "· " + formatEloFileSize(file.size);
          }
          if (preview) {
            preview.classList.add("is-visible");
          }
          if (attachButton) {
            attachButton.classList.add("is-attached");
            attachButton.textContent = "Anexado";
          }
        });
      }

      if (removeButton) {
        removeButton.addEventListener("click", clearEloAttachmentPreview);
      }

    }

    function initEloPromptShortcuts() {
      const buttons = document.querySelectorAll("[data-elo-prompt]");
      const input = document.querySelector(".elo-input");

      if (!buttons.length || !input) {
        return;
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function () {
          input.value = button.getAttribute("data-elo-prompt") || "";
          input.focus();
        });
      });
    }

    window.ELO_PRODUCT_MODE = true;
    window.ELO_SKIP_AUTO_WIDGET = true;
    window.ELO_DISABLE_AUTOFOCUS = true;
    window.ELO_RESIDENTIAL_NEW_PIPELINE = true;

    document.addEventListener("DOMContentLoaded", initEloRotatingPrompt);
    document.addEventListener("DOMContentLoaded", initEloPromptShortcuts);
    document.addEventListener("DOMContentLoaded", function () {
      if (window.EloAssistente && typeof window.EloAssistente.initializeSurface === "function") {
        window.EloAssistente.initializeSurface({
          surface: "elo",
          panel: ".elo-standalone-panel",
          messages: ".elo-messages",
          form: ".elo-input-row",
          input: ".elo-input",
          attachmentInput: ".elo-attachment-input",
          attachmentButton: ".elo-attach-button",
          newChatButton: "[data-elo-new-chat]",
          historyButton: "[data-elo-history]",
          memoryButton: "[data-elo-memory]"
        });
        initEloRotatingPrompt();
      }
    });
  </script>

    (function () {
      const config = window.RELATORIO_QUALIDADE_CONFIG || {};
      window.ELO_SUPABASE_URL = String(window.ELO_SUPABASE_URL || config.eloSupabaseUrl || "").trim();
      window.ELO_SUPABASE_ANON_KEY = String(window.ELO_SUPABASE_ANON_KEY || config.eloSupabaseAnonKey || "").trim();
      function renderAuthGate(authenticated) {
        document.body.classList.toggle("elo-auth-required", !authenticated);
        document.body.classList.toggle("elo-authenticated", authenticated);
      }
      function setAuthenticated(value) {
        renderAuthGate(value === true);
      }
      function syncValidatedSession() {
        setAuthenticated(window.ELO_AUTH_SESSION_VALIDATED === true);
      }
      window.EloCoreAuthGate = { setAuthenticated: setAuthenticated };
      document.addEventListener("DOMContentLoaded", function () {
        setAuthenticated(false);
        syncValidatedSession();
      });
      window.setInterval(syncValidatedSession, 500);
      setAuthenticated(false);
    })();
  </script>
