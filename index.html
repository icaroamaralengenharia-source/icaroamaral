
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ícaro Amaral | Perícias de Engenharia, Laudos e Assistência Técnica Judicial</title>

<meta name="description" content="Especialista em perícias de engenharia civil, laudos técnicos, assistência técnica judicial e fiscalização de obras em todo o Brasil.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Montserrat',sans-serif;
background:#07111f;
background-image:url('imagens/textura-concreto.png');
background-size:cover;
background-attachment:fixed;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(212,175,55,0.14), transparent 25%),
radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 20%),
linear-gradient(135deg,#020617,#07111f,#0f172a);
z-index:-2;
}

nav{
position:fixed;
top:0;
width:100%;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(2,6,23,0.82);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:999;
}

.logo{
display:flex;
align-items:center;
gap:14px;
}

.logo-icon{
width:58px;
height:58px;
border-radius:16px;
background:linear-gradient(135deg,#d4af37,#f5d76e);
display:flex;
align-items:center;
justify-content:center;
font-size:1.7rem;
color:#07111f;
font-weight:800;
box-shadow:0 10px 30px rgba(212,175,55,0.25);
}

.logo-text h1{
font-size:1rem;
font-weight:800;
letter-spacing:0.5px;
}

.logo-text p{
font-size:0.8rem;
opacity:0.85;
margin-top:2px;
}

.top-info{
display:flex;
gap:12px;
flex-wrap:wrap;
justify-content:flex-end;
}

.info-item{
padding:10px 14px;
border-radius:50px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
font-size:0.82rem;
}

header{
min-height:100vh;
padding:95px 18px 30px;
display:flex;
align-items:center;
justify-content:center;
}

.hero{
max-width:1400px;
width:100%;
display:grid;
grid-template-columns:330px 1fr;
gap:28px;
align-items:stretch;
}

.profile-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:24px;
overflow:hidden;
backdrop-filter:blur(12px);
box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.profile-card img{
width:100%;
height:330px;
object-fit:cover;
display:block;
}

.profile-content{
padding:18px;
}

.profile-content h2{
font-size:1.6rem;
margin-bottom:8px;
}

.profile-content p{
font-size:0.92rem;
color:#d6d6d6;
margin-bottom:5px;
}

.stats{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.stat-item{
padding:8px 12px;
border-radius:10px;
background:rgba(255,255,255,0.06);
font-size:0.78rem;
}

.hero-content{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:26px;
padding:28px;
backdrop-filter:blur(12px);
box-shadow:0 20px 50px rgba(0,0,0,0.28);
}

.tag{
display:inline-block;
padding:10px 18px;
border-radius:50px;
background:rgba(212,175,55,0.12);
border:1px solid rgba(212,175,55,0.35);
color:#f5d76e;
font-size:0.85rem;
font-weight:600;
margin-bottom:18px;
}

.services-top{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.service-item{
padding:12px 16px;
border-radius:12px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.08);
font-size:0.82rem;
font-weight:600;
}

.hero-content h1{
font-size:3rem;
line-height:1.05;
margin-bottom:18px;
font-weight:800;
}

.hero-content h1 span{
color:#f5d76e;
}

.hero-content p{
font-size:0.98rem;
line-height:1.8;
color:#d7d7d7;
margin-bottom:20px;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-bottom:24px;
}

.btn{
padding:15px 22px;
border-radius:14px;
text-decoration:none;
font-size:0.9rem;
font-weight:700;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-primary{
background:linear-gradient(135deg,#25D366,#1ebc59);
color:white;
box-shadow:0 10px 25px rgba(37,211,102,0.28);
}

.btn-secondary{
background:linear-gradient(135deg,#d4af37,#f5d76e);
color:#07111f;
}

.btn-outline{
background:rgba(255,255,255,0.05);
color:white;
border:1px solid rgba(255,255,255,0.12);
}

.carousel{
position:relative;
width:100%;
height:600px;
border-radius:22px;
overflow:hidden;
margin-top:10px;
background:#000;
}

.carousel video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
opacity:0.28;
}

.carousel img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
display:none;
z-index:1;
}

.carousel img.active{
display:block;
}

.carousel-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
z-index:20;
background:rgba(0,0,0,0.45);
color:white;
border:none;
width:52px;
height:52px;
border-radius:50%;
cursor:pointer;
font-size:28px;
transition:0.3s;
display:flex;
align-items:center;
justify-content:center;
}

.carousel-btn:hover{
background:rgba(0,0,0,0.75);
}

.prev{
left:18px;
}

.next{
right:18px;
}

.section{
padding:45px 18px;
}

.container{
max-width:1350px;
margin:auto;
}

.section-title{
text-align:center;
margin-bottom:25px;
}

.section-title h2{
font-size:2rem;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:24px;
backdrop-filter:blur(12px);
}

.card h3{
margin-bottom:12px;
color:#f5d76e;
font-size:1rem;
}

.card p{
font-size:0.9rem;
line-height:1.7;
color:#d6d6d6;
}

.testimonials{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
}

.testimonial{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:24px;
border:1px solid rgba(255,255,255,0.08);
}

.testimonial strong{
display:block;
margin-top:15px;
color:#f5d76e;
}

footer{
padding:35px 18px;
text-align:center;
background:#020617;
border-top:1px solid rgba(255,255,255,0.08);
}

footer p{
margin-bottom:8px;
color:#cfcfcf;
font-size:0.9rem;
}

.whatsapp-float{
position:fixed;
right:18px;
bottom:18px;
background:linear-gradient(135deg,#25D366,#1ebc59);
color:white;
padding:16px 22px;
border-radius:60px;
text-decoration:none;
font-weight:700;
font-size:0.95rem;
box-shadow:0 10px 30px rgba(37,211,102,0.35);
z-index:999;
display:flex;
align-items:center;
gap:10px;
}

@media(max-width:1100px){
.hero{
grid-template-columns:1fr;
}
}

@media(max-width:700px){
nav{
flex-direction:column;
gap:10px;
padding:12px;
}

.hero-content h1{
font-size:2.1rem;
}

.carousel{
height:260px;
}

.service-item{
width:100%;
text-align:center;
}

.carousel-btn{
width:42px;
height:42px;
font-size:22px;
}

.whatsapp-float{
padding:14px 18px;
font-size:0.85rem;
}
}

</style>
</head>

<body>

<div class="carousel">

<video autoplay muted loop playsinline>
<source src="imagens/video-obra.mp4" type="video/mp4">
</video>

<button class="carousel-btn prev">&#10094;</button>

<img src="imagens/projeto1.jpg" class="active" alt="Projeto 1">
<img src="imagens/projeto2.jpg" alt="Projeto 2">
<img src="imagens/projeto3.jpg" alt="Projeto 3">

<img src="imagens2/imagem01.jpg" alt="imagem01">
<img src="imagens2/imagem2.jpg" alt="imagem2">
<img src="imagens2/imagem4.jpg" alt="imagem4">

<button class="carousel-btn next">&#10095;</button>

</div>

<script>

const slides = document.querySelectorAll('.carousel img');
const nextBtn = document.querySelector('.next');
const prevBtn = document.querySelector('.prev');

let currentSlide = 0;

function showSlide(index){

slides.forEach((slide)=>{
slide.classList.remove('active');
});

slides[index].classList.add('active');
}

function nextSlide(){

currentSlide++;

if(currentSlide >= slides.length){
currentSlide = 0;
}

showSlide(currentSlide);
}

function prevSlide(){

currentSlide--;

if(currentSlide < 0){
currentSlide = slides.length - 1;
}

showSlide(currentSlide);
}

nextBtn.addEventListener('click', nextSlide);
prevBtn.addEventListener('click', prevSlide);

setInterval(nextSlide, 5000);

showSlide(currentSlide);

</script>

</body>
</html>
