 <script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbx__JYKOhm8kZkDY19FMGRplvZNXp81P0kPGryQN48N6vElrDau0TOI8RR4KjykQK2qig/exec";

async function uploadImagem(inputId){

  const input =
    document.getElementById(inputId);

  if(!input.files.length)
    return "";

  const arquivo =
    input.files[0];
 if(arquivo.size > 8 * 1024 * 1024){

  alert(
    "Imagem muito grande. Máximo 8MB."
  );

  return "";

}

  const base64 =
    await converterBase64(arquivo);

const resposta =
  await fetch(
    WEBAPP_URL,
    {
      method: "POST",
      mode: "no-cors",

      body: JSON.stringify({
        nomeArquivo: arquivo.name,
        base64: base64.split(",")[1]
      })

    }
  );

console.log("Upload enviado");

return "UPLOAD_OK";

}

function converterBase64(file){

  return new Promise((resolve,reject)=>{

    const leitor =
      new FileReader();

    leitor.readAsDataURL(file);

    leitor.onload =
      ()=> resolve(leitor.result);

    leitor.onerror =
      erro => reject(erro);

  });

}

</script>
 <script>

async function enviarFormulario(event){

event.preventDefault();

const botao =
document.getElementById(
"btnEnviar"
);

botao.innerHTML =
"Enviando imagens...";

botao.disabled = true;

try{

const foto1 =
await uploadImagem("foto1");

const foto2 =
await uploadImagem("foto2");

const foto3 =
await uploadImagem("foto3");



document.getElementById(
"linkFoto1"
).value = foto1;

document.getElementById(
"linkFoto2"
).value = foto2;

document.getElementById(
"linkFoto3"
).value = foto3;



await new Promise(
  resolve => setTimeout(resolve,1000)
);

event.target.submit();

setTimeout(function(){

document.getElementById(
"mensagem-sucesso"
).style.display = "block";

alert(
"Relatório enviado com sucesso!"
);

document.querySelector(
"form"
).reset();

botao.innerHTML =
"Enviar Relatório";

botao.disabled = false;

},1500);
}catch(erro){

alert(
"Erro ao enviar imagens"
);

console.log(erro);

botao.innerHTML =
"Enviar Relatório";

botao.disabled = false;

}
 return false;

}
