<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ícaro Amaral Engenharia</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#071a35;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo h1{
font-size:42px;
margin:0;
color:#d4a63d;
}

.logo p{
margin-top:10px;
color:#ccc;
font-size:18px;
}

.card{
background:white;
color:#111;
border-radius:20px;
padding:35px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.section-title{
margin-top:0;
margin-bottom:30px;
font-size:24px;
color:#071a35;
border-left:6px solid #d4a63d;
padding-left:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1 / -1;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
margin-top:10px;
}

input,
textarea,
select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
resize:vertical;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:14px;
background:#d4a63d;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
transform:scale(1.01);
}

.inconformidade{
border:2px solid #eee;
padding:25px;
border-radius:18px;
margin-bottom:25px;
background:#fafafa;
}

.inconformidade h3{
margin-top:0;
color:#071a35;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.logo h1{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<h1>Ícaro Amaral Engenharia</h1>
<p>Sistema Inteligente de Relatórios de Qualidade de Obras</p>
</div>

<form
action="https://docs.google.com/forms/d/e/1FAIpQLSfnUmJyQc9n7HZsD3MhTDSWstBAI8xnLN9JYlrwlArrNX3tGg/formResponse"
method="POST"
target="_blank"
>

<label>Obra</label>
<input
type="text"
name="entry.2103603575"
required
>

<label>Data da vistoria</label>
<input
type="date"
name="entry.1680077394"
>

<label>Responsável Técnico</label>
<input
type="text"
name="entry.1076303558"
>

<label>Local</label>
<input
type="text"
name="entry.1080839875"
>

<label>Data de início da obra</label>
<input
type="date"
name="entry.897927114"
>

<label>Link de câmeras</label>
<input
type="text"
name="entry.866299979"
>

<button type="submit">
Enviar Relatório
</button>

</form>

</div>



</body>
</html>
