<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ícaro Amaral Engenharia</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071a35;
color:white;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo h1{
font-size:42px;
margin:0;
color:#d4a63d;
}

.logo p{
margin-top:10px;
color:#ccc;
}

.card{
background:white;
color:#111;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
margin-top:0;
color:#071a35;
}

input,
textarea{
width:100%;
padding:15px;
margin-top:10px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:12px;
background:#d4a63d;
color:white;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>Ícaro Amaral Engenharia</h1>
<p>Relatório de Qualidade de Obras</p>
</div>

<div class="card">

<h2>Nova Inspeção</h2>

<form id="meuForm">

<label>Obra</label>
<input type="text" name="obra" required>

<label>Descrição Técnica</label>
<textarea name="descricao" rows="5"></textarea>

<label>Data da Vistoria</label>
<input type="date" name="data">

<label>Responsável Técnico</label>
<input type="text" name="responsavel">

<label>Fotos da Obra</label>
<input type="file" name="fotos" multiple>

<button type="submit">
Enviar Relatório
</button>

</form>

</div>

</div>

<script>

document.getElementById('meuForm')
.addEventListener('submit', async function(e){

e.preventDefault();

const form = document.getElementById('meuForm');

const formData = new FormData(form);

await fetch("https://script.google.com/macros/s/AKfycbwVEx_7Dm9xnqGqo7a1cFB5Mp8YS-NJ0DUyODq95PTDugL84VOcOxkyFbxWvDCpy8wgqQ/exec",{
  method:"POST",
  body:formData
});

alert("Relatório enviado com sucesso!");

});

</script>

</body>
</html>
