<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ícaro Amaral Engenharia</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:
linear-gradient(
135deg,
#03152b,
#08264d,
#0b35ba
);
color:white;
min-height:100vh;
}
 .hero-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
rgba(3,21,43,0.85),
rgba(3,21,43,0.92)
),
url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1974&auto=format&fit=crop');
background-size:cover;
background-position:center;
z-index:-1;
filter:blur(2px);
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo h1{
font-size:42px;
margin:0;
color:#d4a63d;
}

.logo p{
margin-top:10px;
color:#ccc;
font-size:18px;
}

.card{
background:rgba(255,255,255,0.96);
backdrop-filter:blur(10px);
color:#111;
border-radius:20px;
padding:35px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.section-title{
margin-top:0;
margin-bottom:30px;
font-size:24px;
color:#071a35;
border-left:6px solid #d4a63d;
padding-left:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:1 / -1;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
margin-top:10px;
}

input,
textarea,
select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
resize:vertical;
}

button{
width:100%;
padding:20px;
border:none;
border-radius:14px;
background:#d4a63d;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
transform:scale(1.01);
}

.inconformidade{
border:2px solid #eee;
padding:25px;
border-radius:18px;
margin-bottom:25px;
background:#fafafa;
}

.inconformidade h3{
margin-top:0;
color:#071a35;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.logo h1{
font-size:32px;
}

}

</style>

</head>

<script>

function fazerLogin(){

var usuario =
document.getElementById("usuario").value;

var senha =
document.getElementById("senha").value;

if(

(usuario === "Ícaro Amaral"
&&
senha === "04544442575")

||

(usuario === "Visitante"
&&
senha === "1234")

){

document.getElementById(
"login"
).style.display = "none";

document.getElementById(
"sistema"
).style.display = "block";

}else{

document.getElementById(
"erro-login"
).style.display = "block";

}



}

</script>
 <script>

function mostrarMensagem(){

setTimeout(function(){

document.getElementById(
"mensagem-sucesso"
).style.display = "block";

document.querySelector("form").reset();

},1000);

}

</script>
