<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comprar Filhos Fortes | Pix</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:linear-gradient(135deg,#07111d,#102336);color:#182331}
    .box{width:min(620px,100%);padding:clamp(28px,6vw,48px);border-radius:8px;background:#fbf8f1;box-shadow:0 24px 70px rgba(0,0,0,.28);text-align:center}
    .eyebrow{margin:0 0 12px;color:#b99349;font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    h1{margin:0;color:#102336;font-family:Georgia,serif;font-size:clamp(38px,7vw,60px);line-height:1.05}
    p{color:#647080;font-size:18px;line-height:1.6}
    .price{margin:16px 0 8px;color:#102336;font-family:Georgia,serif;font-size:54px;font-weight:700}
    .meta{margin:0 0 20px;color:#647080;font-size:15px}
    .qr{display:block;width:min(280px,100%);height:auto;margin:22px auto;border:10px solid #fff;border-radius:8px}
    .code{width:100%;min-height:112px;padding:14px;border:1px solid rgba(16,35,54,.18);border-radius:8px;background:#fff;color:#102336;font-size:13px;resize:vertical;text-align:left}
    .btn{display:inline-flex;width:100%;min-height:50px;align-items:center;justify-content:center;margin-top:12px;padding:0 22px;border:0;border-radius:8px;background:#d8b56d;color:#07111d;font-size:16px;font-weight:900;text-decoration:none;cursor:pointer}
    .small{margin-top:14px;font-size:14px;color:#647080}
  </style>
</head>
<body>
  <main class="box">
    <p class="eyebrow">Pagamento via Pix</p>
    <h1>Filhos Fortes</h1>
    <div class="price">R$9,90</div>
    <p class="meta">Ícaro Amaral · Mercado Pago</p>

    <img id="qr" class="qr" alt="QR Code Pix">

    <textarea id="pixCode" class="code" readonly></textarea>

    <button class="btn" onclick="copiarPix()">Copiar Pix copia e cola</button>

    <p class="small">Após o pagamento, envie o comprovante pelo WhatsApp para receber o ebook.</p>
  </main>

  <script>
    const pixKey = "06319614536";
    const merchantName = "ICARO AMARAL";
    const merchantCity = "VITORIA CONQ";
    const amount = "9.90";
    const txid = "FILHOSFORTES";

    function tlv(id, value) {
      const size = String(value.length).padStart(2, "0");
      return id + size + value;
    }

    function crc16(payload) {
      let crc = 0xFFFF;
      for (let i = 0; i < payload.length; i++) {
        crc ^= payload.charCodeAt(i) << 8;
        for (let j = 0; j < 8; j++) {
          crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
          crc &= 0xFFFF;
        }
      }
      return crc.toString(16).toUpperCase().padStart(4, "0");
    }

    function gerarPix() {
      const gui = tlv("00", "br.gov.bcb.pix");
      const key = tlv("01", pixKey);
      const merchantAccount = tlv("26", gui + key);
      const additional = tlv("62", tlv("05", txid));

      let payload =
        tlv("00", "01") +
        merchantAccount +
        tlv("52", "0000") +
        tlv("53", "986") +
        tlv("54", amount) +
        tlv("58", "BR") +
        tlv("59", merchantName) +
        tlv("60", merchantCity) +
        additional +
        "6304";

      payload += crc16(payload);
      return payload;
    }

    const pixPayload = gerarPix();
    document.getElementById("pixCode").value = pixPayload;
    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=500x500&margin=20&data=" +
      encodeURIComponent(pixPayload);

    function copiarPix() {
      navigator.clipboard.writeText(pixPayload).then(function () {
        alert("Pix copia e cola copiado.");
      });
    }
  </script>
</body>
</html>
