<!doctype html>
<html lang="pt-BR">
<head>
<meta name="robots" content="noindex, nofollow, noarchive">
<script>
document.documentElement.classList.add('site-access-locked');
</script>

<link rel="stylesheet"
href="/assets/site-access-gate.css?v=20260710-access-v2">

<script
src="/assets/site-access-gate.js?v=20260710-access-v2"
defer></script>
<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comprar Filhos Fortes | Mercado Pago</title>
  <script>
    const CHECKOUT_URL = "https://www.mercadopago.com.br/payment-link/v1/redirect?link-id=eef512c9-6df8-41d2-a86a-1e4db6924c0e&source=link";
    const ACCESS_KEY = "icaro_site_access_v2";

    function hasSiteAccess() {
      try {
        const session = JSON.parse(window.sessionStorage.getItem(ACCESS_KEY) || "null");
        return Boolean(session && session.authenticated === true && Number(session.expiresAt) > Date.now());
      } catch (error) {
        return false;
      }
    }

    function redirectWhenAllowed() {
      if (hasSiteAccess()) window.location.replace(CHECKOUT_URL);
    }

    redirectWhenAllowed();
    window.setInterval(redirectWhenAllowed, 500);
  </script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Arial,sans-serif;background:linear-gradient(135deg,#07111d,#102336);color:#182331}
    .box{width:min(620px,100%);padding:clamp(28px,6vw,48px);border-radius:8px;background:#fbf8f1;box-shadow:0 24px 70px rgba(0,0,0,.28);text-align:center}
    .eyebrow{margin:0 0 12px;color:#b99349;font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    h1{margin:0;color:#102336;font-family:Georgia,serif;font-size:clamp(38px,7vw,60px);line-height:1.05}
    p{color:#647080;font-size:18px;line-height:1.6}
    .price{margin:16px 0 18px;color:#102336;font-family:Georgia,serif;font-size:54px;font-weight:700}
    .btn{display:inline-flex;width:100%;min-height:50px;align-items:center;justify-content:center;margin-top:12px;padding:0 22px;border:0;border-radius:8px;background:#d8b56d;color:#07111d;font-size:16px;font-weight:900;text-decoration:none;cursor:pointer}
    .small{margin-top:14px;font-size:14px;color:#647080}
  </style>
</head>
<body>
  <main class="box">
    <p class="eyebrow">Checkout seguro</p>
    <h1>Filhos Fortes</h1>
    <div class="price">R$19,90</div>
    <p>Você será direcionado para o pagamento seguro pelo Mercado Pago.</p>
    <a class="btn" href="https://www.mercadopago.com.br/payment-link/v1/redirect?link-id=eef512c9-6df8-41d2-a86a-1e4db6924c0e&source=link">Ir para o Mercado Pago</a>
    <p class="small">Se o redirecionamento não acontecer automaticamente, toque no botão acima.</p>
  </main>
</body>
</html>
